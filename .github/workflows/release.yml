# GitHub Actions：自动构建与发布工作流
# 触发条件：推送 tag（如 v1.0.0）时自动执行

name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  # ========== Windows 构建 ==========
  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 Windows 可执行文件
        run: wails build -platform windows/amd64 -o "万能工具箱.exe"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/万能工具箱.exe

  # ========== Linux 构建 ==========
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev gcc

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 Linux 可执行文件
        run: wails build -platform linux/amd64 -o "universal-toolbox"

      - name: 打包为 tar.gz
        run: |
          cd build/bin
          tar -czf universal-toolbox_linux_amd64.tar.gz universal-toolbox

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/universal-toolbox_linux_amd64.tar.gz

  # ========== macOS 构建 ==========
  build-macos:
    name: Build macOS (amd64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 macOS 应用
        run: wails build -platform darwin/amd64

      - name: 打包为 dmg
        run: |
          cd build/bin
          hdiutil create -volname "万能工具箱" -srcfolder "万能工具箱.app" -ov -format UDZO "universal-toolbox_macos.dmg"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/universal-toolbox_macos.dmg

  # ========== 创建 GitHub Release ==========
  release:
    name: 创建 Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4

      - name: 创建 Release 并上传安装包
        uses: softprops/action-gh-release@v1
        with:
          name: "万能工具箱 ${{ github.ref_name }}"
          body: |
            ## 万能工具箱 ${{ github.ref_name }}
            
            🎉 一站式桌面工具集正式发布！
            
            ### 功能包含
            - 🛠️ **开发工具**：JSON/XML/Base64/URL编解码、哈希计算、UUID生成、时间戳转换、正则测试
            - 💻 **系统工具**：进程管理、端口查看、系统信息、批量重命名
            - 📱 **日常工具**：计算器（标准+科学）、单位换算、备忘录
            - 🌐 **网络工具**：Ping测试、内网扫描、HTTP接口测试、Hosts编辑
            
            ### 下载说明
            | 平台 | 文件 |
            |------|------|
            | Windows | `万能工具箱.exe` |
            | Linux | `universal-toolbox_linux_amd64.tar.gz` |
            | macOS | `universal-toolbox_macos.dmg` |
            
            ### 系统要求
            - Windows 10/11 (推荐 Windows 11 以获得最佳云母效果)
            - Linux: Ubuntu 20.04+ / Debian 10+
            - macOS: 10.15+
          files: |
            windows-build/万能工具箱.exe
            linux-build/universal-toolbox_linux_amd64.tar.gz
            macos-build/universal-toolbox_macos.dmg
          token: ${{ secrets.GITHUB_TOKEN }}
